services:
  unified-portal:
    build:
      context: ../unified-portal
    environment:
      PORTAL_HOST: 0.0.0.0
      PORTAL_PORT: 8080
      PORTAL_INTELLIGENCE_URL: /intelligence/
      PORTAL_TRAINING_URL: /training/
      PORTAL_SOLUTION_URL: ${PORTAL_SOLUTION_URL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  customer-intelligence-api:
    build:
      context: ../customer-intelligence
      dockerfile: Dockerfile.api
    environment:
      MOCK_MODE: ${INTELLIGENCE_MOCK_MODE:-true}
      INTELLIGENCE_MOCK_MODE: ${INTELLIGENCE_MOCK_MODE:-true}
      INTELLIGENCE_CORS_ORIGINS: ${PUBLIC_ORIGIN:-http://localhost:8080}
      INTELLIGENCE_RESEARCH_TIMEOUT_SECONDS: ${INTELLIGENCE_RESEARCH_TIMEOUT_SECONDS:-600}
      PYTHON_EXECUTABLE: python3
      TRAINING_INTEGRATION_ENABLED: "true"
      TRAINING_SERVICE_BASE_URL: http://ai-training:5000
      TRAINING_PUBLIC_URL: /training/
      TRAINING_CONNECT_TIMEOUT_MS: ${TRAINING_CONNECT_TIMEOUT_MS:-2000}
      TRAINING_READ_TIMEOUT_MS: ${TRAINING_READ_TIMEOUT_MS:-10000}
      SEARCH_MCP_ENGINE: ${SEARCH_MCP_ENGINE:-baidu}
      SEARCH_SERVICE_BASE_URL: ${SEARCH_SERVICE_BASE_URL:-https://www.baidu.com/s}
      SEARCH_SERVICE_API_KEY: ${SEARCH_SERVICE_API_KEY:-}
      SEARCH_MCP_TIMEOUT: ${SEARCH_MCP_TIMEOUT:-15}
      SEARCH_MAX_FETCH_PAGES: ${SEARCH_MAX_FETCH_PAGES:-80}
      SEARCH_MAX_CONTENT_CHARS: ${SEARCH_MAX_CONTENT_CHARS:-50000}
      SEARCH_MCP_SUMMARIZER_API_BASE: ${INTELLIGENCE_MODEL_BASE_URL:-}
      SEARCH_MCP_SUMMARIZER_MODEL: ${INTELLIGENCE_MODEL_NAME:-}
      SEARCH_MCP_SUMMARIZER_API_KEY: ${INTELLIGENCE_MODEL_API_KEY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-127.0.0.1,localhost,ai-training,funasr-service,customer-intelligence-api,unified-portal,nginx}
    volumes:
      - intelligence_reports:/app/tmp/reports
    depends_on:
      ai-training:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5

  customer-intelligence-frontend:
    build:
      context: ../customer-intelligence/frontend
      args:
        VITE_BASE_PATH: /intelligence/
        VITE_API_BASE_URL: /intelligence-api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  ai-training:
    image: ${AI_TRAINING_IMAGE:-deploy-ai-training}:${IMAGE_TAG:-dev}
    build:
      context: ../ai-visit-training
    environment:
      MOCK_MODE: ${TRAINING_MOCK_MODE:-true}
      DEMO_MODE: ${DEMO_MODE:-false}
      DEMO_SCENE_ID: ${DEMO_SCENE_ID:-knowcard/标品/省产品运营中心-安全大脑}
      ASR_ENABLED: ${ASR_ENABLED:-false}
      ASR_PROVIDER: ${ASR_PROVIDER:-http}
      ASR_BASE_URL: ${ASR_BASE_URL:-http://funasr-service:8000}
      ASR_REQUEST_TIMEOUT_SECONDS: ${ASR_REQUEST_TIMEOUT_SECONDS:-120}
      ASR_TIMEOUT_SECONDS: ${ASR_TIMEOUT_SECONDS:-120}
      ASR_MAX_AUDIO_SECONDS: ${ASR_MAX_AUDIO_SECONDS:-120}
      MAX_AUDIO_BYTES: ${MAX_AUDIO_BYTES:-52428800}
      MAX_CONTENT_LENGTH_MB: ${MAX_CONTENT_LENGTH_MB:-52}
      TTS_ENABLED: ${TTS_ENABLED:-false}
      TTS_PROVIDER: ${TTS_PROVIDER:-http}
      TTS_BASE_URL: ${TTS_BASE_URL:-http://tts-service:8001}
      TTS_REQUEST_TIMEOUT_SECONDS: ${TTS_REQUEST_TIMEOUT_SECONDS:-30}
      TTS_MAX_TEXT_CHARS: ${TTS_MAX_TEXT_CHARS:-500}
      TTS_MAX_AUDIO_BYTES: ${TTS_MAX_AUDIO_BYTES:-20971520}
      CORS_ORIGINS: ${PUBLIC_ORIGIN:-http://localhost:8080}
      DEEPSEEK_BASE_URL: ${TRAINING_MODEL_BASE_URL:-}
      DEEPSEEK_MODEL: ${TRAINING_MODEL_NAME:-}
      DEEPSEEK_API_KEY: ${TRAINING_MODEL_API_KEY:-}
      TRAINING_MODEL_ENABLE_THINKING: ${TRAINING_MODEL_ENABLE_THINKING:-false}
      TRAINING_MODEL_MAX_TOKENS: ${TRAINING_MODEL_MAX_TOKENS:-1000}
      DEFAULT_TRAINING_ROUNDS: ${DEFAULT_TRAINING_ROUNDS:-6}
      MODEL_REQUEST_TIMEOUT_SECONDS: ${MODEL_REQUEST_TIMEOUT_SECONDS:-60}
      MODEL_MAX_RETRIES: ${MODEL_MAX_RETRIES:-1}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-7200}
      MAX_SESSIONS: ${MAX_SESSIONS:-100}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-127.0.0.1,localhost,ai-training,funasr-service,tts-service,customer-intelligence-api,unified-portal,nginx}
    volumes:
      - type: bind
        source: ${TRAINING_KNOWCARD_DIR:-../ai-visit-training/knowcard_output}
        target: /app/knowcard_output
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5

  funasr-service:
    profiles: ["asr"]
    image: ${FUNASR_IMAGE:-deploy-funasr-service}:${IMAGE_TAG:-dev}
    build:
      context: ../funasr-service
      args:
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-deb.debian.org}
    environment:
      ASR_MODEL_DIR: /models/funasr
      ASR_DEVICE: cpu
      FUNASR_DEVICE: cpu
      FUNASR_MAX_CONCURRENCY: ${FUNASR_MAX_CONCURRENCY:-2}
      FUNASR_REQUEST_TIMEOUT_SECONDS: ${FUNASR_TIMEOUT_SECONDS:-120}
      FUNASR_MAX_AUDIO_SECONDS: ${FUNASR_MAX_AUDIO_SECONDS:-120}
      FUNASR_MAX_FILE_SIZE_MB: ${FUNASR_MAX_UPLOAD_MB:-50}
      FUNASR_TORCH_THREADS: ${FUNASR_THREADS:-16}
      FUNASR_ALLOW_MODEL_DOWNLOAD: "false"
      CUDA_VISIBLE_DEVICES: ""
    volumes:
      - type: bind
        source: ${FUNASR_MODELS_DIR:-/mnt/disk/models/funasr}
        target: /models/funasr
        read_only: true
        bind:
          create_host_path: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 8
      start_period: 120s
    restart: unless-stopped

  tts-service:
    profiles: ["tts"]
    image: ${TTS_IMAGE:-deploy-tts-service}:${IMAGE_TAG:-dev}
    build:
      context: ../tts-service
    environment:
      TTS_MODEL_DIR: /models/tts/vits-melo-tts-zh_en
      TTS_DEVICE: cpu
      TTS_DATA_DIR: ${TTS_DATA_DIR:-}
      TTS_NUM_THREADS: ${TTS_NUM_THREADS:-8}
      TTS_MAX_TEXT_CHARS: ${TTS_MAX_TEXT_CHARS:-500}
      TTS_SPEAKER_ID: ${TTS_SPEAKER_ID:-0}
      TTS_SPEED: ${TTS_SPEED:-1.0}
      CUDA_VISIBLE_DEVICES: ""
    volumes:
      - type: bind
        source: ${TTS_MODELS_DIR:-/mnt/disk/models/tts}
        target: /models/tts
        read_only: true
        bind:
          create_host_path: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      unified-portal:
        condition: service_healthy
      customer-intelligence-api:
        condition: service_healthy
      customer-intelligence-frontend:
        condition: service_healthy
      ai-training:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/gateway-health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  intelligence_reports:
