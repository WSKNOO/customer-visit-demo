server {
    listen 8080;
    server_name _;
    client_max_body_size 8m;

    location = /gateway-health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"gateway"}';
    }

    location /intelligence-api/ {
        proxy_pass http://customer-intelligence-api:3001/api/;
        proxy_connect_timeout 3s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /intelligence/ {
        proxy_pass http://customer-intelligence-frontend/;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://ai-training:5000/api/;
        proxy_connect_timeout 3s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /training/ {
        proxy_pass http://ai-training:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://unified-portal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
