server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"customer-intelligence-frontend"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
